<!DOCTYPE html>
<html lang="es-CL">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capataz — Sin conexión</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #ffffff;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      max-width: 380px;
      width: 100%;
      text-align: center;
      border: 1px solid #d1fae5;
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      background: #f0fdf4;
    }
    .icon {
      width: 3rem;
      height: 3rem;
      margin: 0 auto 1.25rem;
      color: #0f766e;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #0f766e;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #374151;
    }
  </style>
</head>
<body>
  <div class="card">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M12 3C12 3 5 10.5 5 15a7 7 0 0014 0C19 10.5 12 3 12 3z" />
    </svg>
    <h1>Sin conexión</h1>
    <p>Mostrando última recomendación guardada.</p>
  </div>
</body>
</html>
